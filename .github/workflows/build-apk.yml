name: Build Debug APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode debug keystore
        run: base64 -d debug.keystore.base64 > debug.keystore

      - name: Create .env
        run: cp .env.example .env

      - name: Fix line endings in gradlew
        run: |
          sed -i 's/\r$//' gradlew
          chmod +x gradlew

      - name: Patch build files for CI
        run: |
          python3 - <<'EOF'
          import re, pathlib

          # ── app/build.gradle.kts ───────────────────────────────────────────
          kts = pathlib.Path("app/build.gradle.kts")
          k = kts.read_text()

          # Drop the release signing config block (keystore not available in CI)
          k = re.sub(
              r'create\("release"\)\s*\{[^}]*\}',
              '',
              k,
              flags=re.DOTALL
          )
          # Remove the reference to the now-deleted release signing config
          k = re.sub(r'\s*signingConfig = signingConfigs\.getByName\("release"\)', '', k)

          kts.write_text(k)
          EOF

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pl-advisor-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
