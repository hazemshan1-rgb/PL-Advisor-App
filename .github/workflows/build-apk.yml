name: Build Debug APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix line endings and regenerate Gradle Wrapper
        run: |
          find . -name "gradlew*" -type f -exec sed -i 's/\r$//' {} \;
          chmod +x gradlew gradlew.bat
          ./gradlew wrapper --gradle-version=8.7

      - name: Decode debug keystore
        run: base64 -d debug.keystore.base64 > debug.keystore

      - name: Create .env
        run: cp .env.example .env

      - name: Patch build files to standard AGP 8.x
        run: |
          python3 - <<'EOF'
          import re, pathlib

          # ── gradle/libs.versions.toml ──────────────────────────────────────
          toml = pathlib.Path("gradle/libs.versions.toml")
          t = toml.read_text()
          t = re.sub(r'agp\s*=\s*"[^"]*"',              'agp = "8.7.3"',           t)
          t = re.sub(r'kotlin\s*=\s*"[^"]*"',            'kotlin = "2.1.21"',       t)
          t = re.sub(r'googleDevtoolsKsp\s*=\s*"[^"]*"', 'googleDevtoolsKsp = "2.1.21-1.0.32"', t)
          toml.write_text(t)

          # ── app/build.gradle.kts ───────────────────────────────────────────
          kts = pathlib.Path("app/build.gradle.kts")
          k = kts.read_text()

          # Replace AI Studio custom compileSdk DSL with integer form
          k = re.sub(r'compileSdk\s*\{[^}]*\}', 'compileSdk = 35', k)
          # Bring targetSdk in line
          k = re.sub(r'targetSdk\s*=\s*36', 'targetSdk = 35', k)

          # Drop the release signing config block (keystore not available in CI)
          k = re.sub(
              r'create\("release"\)\s*\{[^}]*\}',
              '',
              k,
              flags=re.DOTALL
          )
          # Remove the reference to the now-deleted release signing config
          k = re.sub(r'\s*signingConfig = signingConfigs\.getByName\("release"\)', '', k)

          kts.write_text(k)
          EOF

      - uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pl-advisor-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
